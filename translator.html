<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelMate - AI Translator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --bg-green-deep: #0f2f1f;
            --green-glow: #00ff55;
            --green-dim: #1f6f4a;
            --text-main: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* DARK RADIAL BACKGROUND */
            background: radial-gradient(circle at center top, var(--bg-green-deep) 0%, var(--bg-black) 90%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* --- FLOATING LANGUAGE ICONS --- */
        .lang-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .float-char {
            position: absolute;
            color: var(--green-glow);
            opacity: 0.1;
            font-weight: 900;
            font-family: serif;
            animation: floatAnimation 15s infinite ease-in-out alternate;
            user-select: none;
        }

        /* Characters: A, 文 (Chinese), あ (Japanese), Ω (Greek), etc. */
        .c1 { top: 10%; left: 10%; font-size: 6rem; animation-duration: 18s; } /* A */
        .c2 { top: 20%; right: 15%; font-size: 5rem; animation-duration: 22s; } /* 文 */
        .c3 { bottom: 15%; left: 20%; font-size: 7rem; animation-duration: 15s; filter: blur(2px); } /* あ */
        .c4 { bottom: 25%; right: 10%; font-size: 4rem; animation-duration: 20s; } /* Ω */
        .c5 { top: 50%; left: 5%; font-size: 3rem; animation-duration: 12s; opacity: 0.05; } /* ñ */
        .c6 { top: 10%; right: 50%; font-size: 4rem; animation-duration: 25s; opacity: 0.05; } /* ? */

        @keyframes floatAnimation {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-40px) rotate(10deg); }
        }

        /* --- NAVIGATION --- */
        nav {
            margin-top: 30px;
            margin-bottom: 30px;
            z-index: 10;
        }

        .nav-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 40px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 85, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 85, 0.05);
            display: flex;
            gap: 20px;
        }

        .nav-container a {
            color: #ccc;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-container a:hover {
            color: var(--green-glow);
            text-shadow: 0 0 10px var(--green-glow);
        }

        /* --- MAIN TRANSLATOR CARD --- */
        .glass-panel {
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            border-color: var(--green-dim);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--green-glow);
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 255, 85, 0.4);
        }

        /* --- INPUTS --- */
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            resize: none;
        }

        textarea:focus {
            border-color: var(--green-glow);
            box-shadow: 0 0 15px rgba(0, 255, 85, 0.1);
            background: rgba(0, 255, 85, 0.05);
        }

        select {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select option {
            background: #000;
            color: white;
            padding: 10px;
        }

        select:focus {
            border-color: var(--green-glow);
        }

        /* --- BUTTON --- */
        .translate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--green-dim), var(--green-glow));
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .translate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--green-glow);
        }

        /* --- RESULT BOX --- */
        #translationResult {
            min-height: 60px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--green-glow);
            font-size: 1.2rem;
            font-weight: 500;
            display: none; /* Hidden by default */
            text-align: left;
        }

    </style>
</head>

<body>

    <div class="lang-bg">
        <div class="float-char c1">A</div>
        <div class="float-char c2">文</div>
        <div class="float-char c3">あ</div>
        <div class="float-char c4">Ω</div>
        <div class="float-char c5">ñ</div>
        <div class="float-char c6"><i class="fas fa-language"></i></div>
    </div>

    <nav>
        <div class="nav-container">
            <a href="originalpage.html">Home</a>
            <a href="aboutusmain.html">About</a>
            <a href="translator.html" style="color:var(--green-glow)">Translator</a>
            <a href="contactus.html">Contact</a>
        </div>
    </nav>

    <div class="glass-panel">
        <h1>AI <span>Translator</span></h1>
        
        <textarea id="inputText" placeholder="Type text here to translate..."></textarea>

        <select id="targetLang">
            <option value="hi">Hindi (हिंदी) 🇮🇳</option>
            <option value="te">Telugu (తెలుగు) 🇮🇳</option>
            <option value="ta">Tamil (தமிழ்) 🇮🇳</option>
            <option value="ml">Malayalam (മലയാളം) 🇮🇳</option>
            <option value="kn">Kannada (ಕನ್ನಡ) 🇮🇳</option>
            <option value="fr">French (Français) 🇫🇷</option>
            <option value="es">Spanish (Español) 🇪🇸</option>
            <option value="de">German (Deutsch) 🇩🇪</option>
            <option value="ja">Japanese (日本語) 🇯🇵</option>
            <option value="zh-Hans">Chinese (Simplified) 🇨🇳</option>
            <option value="ko">Korean (한국어) 🇰🇷</option>
            <option value="ru">Russian (Русский) 🇷🇺</option>
            <option value="ar">Arabic (العربية) 🇸🇦</option>
        </select>

        <button class="translate-btn" onclick="translateText()">
            TRANSLATE NOW <i class="fas fa-arrow-right"></i>
        </button>

        <div id="translationResult"></div>
    </div>

    <script>
        async function translateText() {
            // 1. Get user input
            const text = document.getElementById("inputText").value;
            const targetLang = document.getElementById("targetLang").value;
            const resultBox = document.getElementById("translationResult");
            const btn = document.querySelector(".translate-btn");

            if (!text) {
                alert("Please type something to translate!");
                return;
            }

            // 2. UI Loading State
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Translating...';
            btn.style.opacity = "0.8";
            resultBox.style.display = "block";
            resultBox.innerHTML = "Processing...";

            // 3. Azure Configuration (PASTE YOUR KEYS HERE)
            const subscriptionKey = "9DxaqW8ypriIUm7J0HX2FN9gYp85vHduCdGSzcLhpHttvV1LQpZQJQQJ99CAACGhslBXJ3w3AAAbACOGbAk5";
            const region = "centralindia"; // e.g., 'eastus' or 'global'
            const endpoint = "https://api.cognitive.microsofttranslator.com/translate?api-version=3.0";

            // 4. Call API
            try {
                const response = await fetch(`${endpoint}&to=${targetLang}`, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": subscriptionKey,
                        "Ocp-Apim-Subscription-Region": region,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify([{ "Text": text }])
                });

                const data = await response.json();
                
                // 5. Show Result
                if (data && data[0] && data[0].translations) {
                    resultBox.innerHTML = `<strong>Translated:</strong><br>${data[0].translations[0].text}`;
                    resultBox.style.border = "1px solid #00ff55";
                } else {
                    resultBox.innerHTML = "⚠️ Error: Could not translate.";
                }
            } catch (error) {
                console.error(error);
                resultBox.innerHTML = "❌ Failed to connect. Check your API Key.";
            }

            // Reset Button
            btn.innerHTML = 'TRANSLATE NOW <i class="fas fa-arrow-right"></i>';
            btn.style.opacity = "1";
        }
    </script>
</body>
</html>
