<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Places to Visit in India</title>
    <style>
      /* ================= GLOBAL ================= */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(to bottom, #071f18, #0b2e24);
  color: #cfeee4;
}

/* ================= HEADER ================= */
header {
  background: linear-gradient(to right, #0b2e24, #114235);
  color: #e6fff7;
  padding: 28px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

header h1 {
  margin: 0;
  font-size: 30px;
  letter-spacing: 1px;
}

/* ================= CATEGORY GRID ================= */
.category-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 40px 20px;
  gap: 28px;
}

/* ================= CATEGORY CARD ================= */
.category {
  width: 210px;
  height: 210px;
  background-size: cover;
  background-position: center;
  border-radius: 18px;
  cursor: pointer;
  position: relative;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  overflow: hidden;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: fadeIn 0.9s ease-in;
}

.category:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 30px 65px rgba(0,0,0,0.85);
}

/* DARK OVERLAY */
.category::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.75)
  );
}

/* CATEGORY LABEL */
.category span {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
  padding: 12px;
  font-weight: bold;
  letter-spacing: 0.5px;
  color: #e6fff7;
  background: linear-gradient(
    to right,
    rgba(11,46,36,0.9),
    rgba(17,66,53,0.9)
  );
}

/* ================= PLACES LIST ================= */
.places-container {
  display: none;
  padding: 40px 20px;
  max-width: 1000px;
  margin: auto;
}

/* ================= PLACE CARD ================= */
.place {
  display: flex;
  align-items: center;
  margin-bottom: 28px;
  background: linear-gradient(145deg, #0b2e24, #114235);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6);
  transition: all 0.3s ease;
}

.place:hover {
  transform: scale(1.02);
  box-shadow: 0 28px 60px rgba(0,0,0,0.8);
}

.place img {
  width: 160px;
  height: 110px;
  border-radius: 14px;
  object-fit: cover;
  margin-right: 22px;
  filter: brightness(0.95);
}

/* ================= PLACE INFO ================= */
.place-info h3 {
  margin: 0;
  color: #a8e6cf;
  font-size: 1.3rem;
}

.place-info p {
  margin-top: 6px;
  color: #d9f4eb;
  font-size: 1.05rem;
  line-height: 1.6;
}

/* ================= HERO SECTION ================= */
.hero {
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/1d/Taj_Mahal_in_March_2004.jpg');
  background-size: cover;
  background-position: center;
  padding: 110px 20px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  margin-top: 50px;
}

/* HERO OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(7,31,24,0.85),
    rgba(11,46,36,0.95)
  );
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: auto;
  animation: fadeInUp 1.2s ease-out;
}

.hero h2 {
  font-size: 3rem;
  margin-bottom: 20px;
  color: #e6fff7;
}

.hero p {
  font-size: 1.2rem;
  margin-bottom: 32px;
  color: #cfeee4;
}

/* ================= BUTTON ================= */
.explore-btn {
  background: linear-gradient(135deg, #3db083, #2e8b6f);
  color: #051510;
  padding: 14px 34px;
  font-size: 1rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s ease;
  box-shadow: 0 12px 28px rgba(61,176,131,0.6);
}

.explore-btn:hover {
  transform: scale(1.08);
  background: linear-gradient(135deg, #7fffd4, #3db083);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
  .category {
    width: 100%;
    max-width: 320px;
  }

  .place {
    flex-direction: column;
    text-align: center;
  }

  .place img {
    width: 100%;
    height: 200px;
    margin: 0 0 15px;
  }

  .hero h2 {
    font-size: 2.2rem;
  }
}

    </style>

      function showPlaces(category) {
        const container = document.getElementById("placesContainer");
        container.innerHTML = "";
        container.style.display = "block";

        places[category].forEach(place => {
          const placeDiv = document.createElement("div");
          placeDiv.className = "place";
          placeDiv.innerHTML = `
            <img src="${place.image}" alt="${place.name}" />
            <div class="place-info">
              <h3>${place.name}</h3>
              <p>${place.description}</p>
            </div>
          `;
          container.appendChild(placeDiv);
        });
