<!DOCTYPE html>
<html>
<head>
  <title>Live Location with Leaflet</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map {
      height: 500px;
      width: 100%;
    }
  </style>
</head>
<body>

<h2>📍 Your Live Location</h2>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([0, 0], 2); // Default view

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const marker = L.marker([0, 0]).addTo(map);

  function updateLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        console.log("Live location: ", lat, lng); // Debug log

        map.setView([lat, lng], 15);
        marker.setLatLng([lat, lng]).bindPopup("📍 You are here").openPopup();
      }, error => {
        alert("Error fetching location: " + error.message);
      });
    } else {
      alert("Geolocation not supported");
    }
  }

  updateLocation();
  setInterval(updateLocation, 10000); // Update every 10 seconds
</script>

</body>
</html>
