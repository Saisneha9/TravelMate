<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginPage</title>
    <style>
        * {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {

            background: linear-gradient(#ffcc00b1 0%, #ffd7698c 50%, #ffeaafa2 100%);

        }

        .container {
            max-width: 350px;
            background: #F8F9FD;
            border-radius: 40px;
            padding: 25px 35px;
            border: 5px solid #fff;
            box-shadow: rgba(94, 94, 94, 0.578) 0px 8px 8px 5px;
            margin: 20px;
            margin-left: 430px;
            margin-top: 110px;
            margin-bottom: 119px;
        }

        .container:hover {
            transform: scale(1.03);
            transition: all 0.2s ease-in-out;
        }

        .heading {
            text-align: center;
            font-weight: 700;
            font-size: 30px;
            color: rgb(0, 0, 0);
        }

        .form {
            margin-top: 20px;
        }

        .form .input {
            width: 80%;
            background: white;
            border: none;
            padding: 15px 8px;
            border-radius: 20px;
            margin-top: 15px;
            margin-left: 25px;
            box-shadow: #767676 0px 10px 10px -5px;
            border-inline: 2px solid transparent;
            border: 0.5px solid gray;
        }

        .form .input::-moz-placeholder {
            color: rgb(170, 170, 170);
        }

        .form .input::placeholder {
            color: rgb(170, 170, 170);
        }

        .form .input:focus {
            outline: none;
            border: 2px solid #2a2a2a;
        }

        .form .forgot-password {
            display: block;
            margin-top: 10px;
            margin-left: 10px;
            margin-right: 10px;
        }

        .form .forgot-password a {
            font-size: 14px;
            color: #000000;
            text-decoration: none;
        }

        .form .login-button {
            display: block;
            width: 90%;
            font-weight: bold;
            background: linear-gradient(45deg, rgb(48, 48, 48) 0%, rgba(24, 24, 24, 0.795) 100%);
            color: white;
            padding-block: 12px;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: rgba(0, 0, 0, 0.279) 0px 20px 10px -15px;
            border: none;
            transition: all 0.2s ease-in-out;
            font-size: medium;
        }

        .form .login-button:hover {
            transform: scale(1.03);
            box-shadow: rgb(255, 243, 243) 0px 23px 10px -20px;
        }

        .form .login-button:active {
            transform: scale(0.95);
            box-shadow: rgba(133, 189, 215, 0.8784313725) 0px 15px 10px -10px;
        }

        .social-account-container {
            margin-top: 25px;
        }

        .social-account-container .title {
            display: block;
            text-align: center;
            font-size: 10px;
            color: rgb(170, 170, 170);
        }

        .social-account-container .social-accounts {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 5px;
        }

        .social-account-container .social-accounts .social-button {
            background: linear-gradient(45deg, rgb(0, 0, 0) 0%, rgb(112, 112, 112) 100%);
            border: 5px solid white;
            padding: 5px;
            border-radius: 50%;
            width: 40px;
            aspect-ratio: 1;
            display: grid;
            place-content: center;
            box-shadow: rgba(133, 189, 215, 0.8784313725) 0px 12px 10px -8px;
            transition: all 0.2s ease-in-out;
        }

        .social-account-container .social-accounts .social-button .svg {
            fill: white;
            margin: auto;
        }

        .social-account-container .social-accounts .social-button:hover {
            transform: scale(1.2);
        }

        .social-account-container .social-accounts .social-button:active {
            transform: scale(0.9);
        }

        .agreement {
            display: block;
            text-align: center;
            margin-top: 15px;
        }

        .agreement a {
            text-decoration: none;
            color: #000000;
            font-size: 11px;
        }
    </style>
</head>

<body>


    <div class="container">
        <div class="heading">Sign In</div>
        <form action="" class="form">
            <input required="" class="input" type="email" name="email" id="email" placeholder="E-mail">
            <input required="" class="input" type="password" name="password" id="password" placeholder="Password">
            <span class="forgot-password"><a href="#">Forgot Password ?</a></span>
            <input class="login-button" type="submit" value="Sign In">

        </form>
        <div class="social-account-container">
            <span class="title" style="font-size: 11px;color: #000000;">Or Sign in with</span>
            <div class="social-accounts">
                <button class="social-button google">
                    <svg class="svg" xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 488 512">
                        <path
                            d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z">
                        </path>
                    </svg></button>
                <button class="social-button apple">
                    <svg class="svg" xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 384 512">
                        <path
                            d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z">
                        </path>
                    </svg>
                </button>
                <button class="social-button twitter">
                    <svg class="svg" xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 512 512">
                        <path
                            d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
        <span class="agreement"><a href="#">Learn user licence agreement</a></span>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
    
            // Clear previous messages
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
    
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
    
                const result = await response.json();
                
                if (result.success) {
                    // Show success message exactly as received from server
                    const successMsg = document.getElementById('successMessage');
                    successMsg.textContent = result.message; // "Login successful! Redirecting..."
                    successMsg.style.display = 'block';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/originalpage.html';
                    }, 2000);
                } else {
                    // Show error message exactly as received from server
                    const errorMsg = document.getElementById('errorMessage');
                    errorMsg.textContent = result.message; 
                    errorMsg.style.display = 'block';
                    
                    // If account doesn't exist, highlight register link
                    if (result.message.includes('register')) {
                        document.querySelector('.register-link').style.fontWeight = 'bold';
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
