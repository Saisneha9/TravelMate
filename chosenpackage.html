<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chosen Package</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ================= BASE STYLES ================= */
:root {
  --primary: #ff6f00;
  --primary-light: #ffcc80;
  --primary-dark: #e65100;
  --secondary: #2e7d32;
  --secondary-light: #e8f5e9;
  --light: #fff7f0;
  --white: #ffffff;
  --text-dark: #333;
  --text-light: #666;
  --shadow: rgba(0, 0, 0, 0.08);
  --shadow-dark: rgba(0, 0, 0, 0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #faf9f7;
  color: var(--text-dark);
  line-height: 1.6;
  min-height: 100vh;
}

/* ================= HERO SECTION ================= */
.hero {
  height: 55vh;
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
}

.hero-text {
  position: relative;
  color: white;
  text-align: center;
  z-index: 2;
  max-width: 800px;
  padding: 0 30px;
  animation: fadeInUp 1s ease;
}

.hero-text h1 {
  font-size: 3.2rem;
  margin-bottom: 15px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  font-weight: 700;
}

.hero-text p {
  font-size: 1.3rem;
  opacity: 0.9;
  margin-bottom: 25px;
  font-weight: 300;
}

/* ================= INFO SECTION ================= */
.info-box {
  max-width: 850px;
  margin: -30px auto 50px;
  background: var(--white);
  padding: 25px 35px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 30px var(--shadow);
  position: relative;
  z-index: 5;
  border: 1px solid rgba(255, 111, 0, 0.1);
}

.info-box h2 {
  color: var(--primary);
  font-size: 1.9rem;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-weight: 600;
}

.info-box p {
  font-size: 1.1rem;
  color: var(--text-light);
  line-height: 1.7;
}

/* ================= TIMELINE SECTION ================= */
.timeline-container {
  max-width: 900px;
  margin: 0 auto 50px;
  padding: 0 30px;
}

.timeline-header {
  text-align: center;
  margin-bottom: 40px;
}

.timeline-header h2 {
  font-size: 2.3rem;
  color: var(--primary);
  margin-bottom: 12px;
  font-weight: 700;
}

.timeline-header p {
  font-size: 1.15rem;
  color: var(--text-light);
  font-weight: 300;
}

/* TIMELINE */
.timeline {
  position: relative;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 4px;
  background: linear-gradient(to bottom, var(--primary), var(--primary-light));
}

/* PLACE CARDS */
.place {
  position: relative;
  margin-bottom: 50px;
  width: 46%;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.6s forwards;
}

.place:nth-child(odd) {
  left: 0;
  padding-right: 60px;
  text-align: right;
}

.place:nth-child(even) {
  left: 54%;
  padding-left: 60px;
}

/* TIMELINE DOTS */
.place::before {
  content: "";
  position: absolute;
  top: 40px;
  width: 20px;
  height: 20px;
  background: var(--white);
  border: 5px solid var(--primary);
  border-radius: 50%;
  z-index: 10;
  box-shadow: 0 0 0 6px rgba(255, 111, 0, 0.15);
}

.place:nth-child(odd)::before {
  right: -10px;
}

.place:nth-child(even)::before {
  left: -10px;
}

/* PLACE CONTENT */
.place-content {
  background: var(--white);
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 8px 25px var(--shadow);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 111, 0, 0.08);
}

.place-content:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 35px var(--shadow-dark);
}

/* PLACE HEADER */
.place-header {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
  gap: 15px;
}

.place-number {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  background: var(--primary);
  color: white;
  border-radius: 50%;
  font-size: 1.3rem;
  font-weight: 700;
  flex-shrink: 0;
}

.place-title {
  font-size: 1.6rem;
  color: var(--primary);
  margin: 0;
  font-weight: 600;
}

/* PLACE DETAILS */
.place-details {
  margin-top: 5px;
}

.place-name {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  line-height: 1.3;
}

.place-name i {
  color: var(--primary);
  font-size: 1.4rem;
}

.place-description {
  color: var(--text-light);
  font-size: 1.1rem;
  margin-bottom: 22px;
  line-height: 1.7;
  font-weight: 400;
}

.journey-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  background: var(--secondary-light);
  color: var(--secondary);
  font-size: 0.95rem;
  font-weight: 600;
  border-radius: 20px;
  border: 1px solid rgba(46, 125, 50, 0.1);
}

/* ================= NEXT BUTTON ================= */
.next-btn {
  text-align: center;
  margin: 50px auto 80px;
  max-width: 450px;
}

.next-btn button {
  background: linear-gradient(to right, var(--primary), var(--primary-dark));
  color: white;
  font-size: 1.2rem;
  padding: 16px 40px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 0 auto;
  box-shadow: 0 8px 20px rgba(255, 111, 0, 0.25);
  font-weight: 600;
  letter-spacing: 0.5px;
}

.next-btn button:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(255, 111, 0, 0.35);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
  .timeline-container {
    padding: 0 20px;
  }
  
  .place {
    width: 48%;
  }
}

@media (max-width: 768px) {
  .hero {
    height: 50vh;
  }
  
  .hero-text h1 {
    font-size: 2.5rem;
  }
  
  .hero-text p {
    font-size: 1.2rem;
  }
  
  .info-box {
    margin: -20px 20px 40px;
    padding: 22px 25px;
  }
  
  .timeline::before {
    left: 30px;
  }
  
  .place {
    width: 100%;
    left: 0 !important;
    padding-left: 70px !important;
    padding-right: 20px !important;
    text-align: left !important;
    margin-bottom: 40px;
  }
  
  .place:nth-child(odd)::before,
  .place:nth-child(even)::before {
    left: 20px;
    right: auto;
  }
  
  .place-content {
    padding: 24px;
  }
  
  .place-name {
    font-size: 1.6rem;
  }
  
  .next-btn {
    margin: 40px 20px 60px;
  }
  
  .next-btn button {
    width: 100%;
    max-width: 320px;
  }
}

@media (max-width: 480px) {
  .hero-text h1 {
    font-size: 2.2rem;
  }
  
  .timeline-header h2 {
    font-size: 2rem;
  }
  
  .place-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  
  .place-number {
    width: 42px;
    height: 42px;
    font-size: 1.2rem;
  }
  
  .place-title {
    font-size: 1.4rem;
  }
  
  .place-name {
    font-size: 1.5rem;
  }
}

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1 id="title"></h1>
  </div>
</div>

<!-- INFO BOX -->
<div class="info-box">
  <h2><i class="fas fa-route"></i> Your Selected Package</h2>
  <p>Discover amazing destinations carefully selected for your chosen category. Each place offers unique experiences.</p>
</div>

<!-- TIMELINE CONTAINER -->
<div class="timeline-container">
  <div class="timeline-header">
    <h2>Your Journey</h2>
    <p>Explore each destination in your package</p>
  </div>
  
  <div class="timeline" id="timeline"></div>
</div>

<!-- NEXT BUTTON -->
<div class="next-btn">
  <button onclick="goToBudget()">
    <i class="fas fa-coins"></i> Plan Your Budget
    <i class="fas fa-arrow-right"></i>
  </button>
</div>

<script>
/* =======================
   READ DATA FROM LOCALSTORAGE
======================= */
const category = localStorage.getItem("selectedCategory");
const places = JSON.parse(localStorage.getItem("selectedPlaces"));
const timeline = document.getElementById("timeline");

/* =======================
   TITLE MAPPING
======================= */
const titleMap = {
  cultural: "Cultural & Historical Adventure",
  nature: "Nature & Mountains Adventure",
  beaches: "Beaches & Islands Adventure",
  spiritual: "Spiritual Retreat Adventure",
  modern: "Modern Cities Adventure",
  wildlife: "Wildlife & Nature Adventure"
};

document.getElementById("title").innerText = 
  titleMap[category] || "Adventure Begins Here";

/* =======================
   TIMELINE GENERATION
======================= */
if (!places || !category) {
  timeline.innerHTML = `
    <div style="text-align:center; padding:40px;">
      <h3 style="color:#ff6f00;">No package selected</h3>
      <p>Please go back and select a package first.</p>
    </div>
  `;
} else {
  // Add delay for staggered animation
  let animationDelay = 0;
  
  places.forEach((place, index) => {
    const div = document.createElement("div");
    div.className = "place";
    div.style.animationDelay = `${animationDelay}s`;
    animationDelay += 0.15;
    
    div.innerHTML = `
      <div class="place-content">
        <div class="place-header">
          <div class="place-number">${index + 1}</div>
          <h3 class="place-title">Destination ${index + 1}</h3>
        </div>
        <div class="place-details">
          <div class="place-name">
            <i class="fas fa-map-marker-alt"></i>
            ${place.name}
          </div>
          <p class="place-description">${place.description}</p>
          <span class="journey-badge">
            <i class="fas fa-check-circle"></i> Included in your journey
          </span>
        </div>
      </div>
    `;
    
    timeline.appendChild(div);
  });
}

/* =======================
   NEXT STEP FUNCTION
======================= */
function goToBudget() {
  localStorage.setItem("bookingDetails", JSON.stringify({
    type: "category",
    title: document.getElementById("title").innerText,
    subtitle: "Category Package Booked",
    sourcePage: "chosenpackage.html"
  }));

  window.location.href = "budgetplanner.html";
}

/* =======================
   HERO IMAGE PER CATEGORY
======================= */
const hero = document.querySelector(".hero");

const heroImageMap = {
  cultural: "cultural.jpeg",
  nature: "nature.jpeg",
  beaches: "beaches.jpeg",
  spiritual: "spiritual.jpeg",
  modern: "modern.jpeg",
  wildlife: "wildlife.jpeg"
};

// fallback image if category missing
const defaultHero = "images/default-category.jpg";

hero.style.backgroundImage = `url('${heroImageMap[category] || defaultHero}')`;

/* =======================
   ADD SCROLL ANIMATION
======================= */
document.addEventListener('DOMContentLoaded', function() {
  const placeElements = document.querySelectorAll('.place');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.1 });
  
  placeElements.forEach(place => observer.observe(place));
});
</script>

</body>
</html>
