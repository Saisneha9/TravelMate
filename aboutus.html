<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Us | Smart Travel Planner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            text-align: center;
        }

        .container {
            padding: 50px;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #ff9800;
            opacity: 0;
        }

        .description {
            font-size: 18px;
            color: #555;
            max-width: 800px;
            margin: auto;
            opacity: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
            opacity: 0;
        }

        .point {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            transform: translateY(30px);
        }

        .svg-number {
            font-size: 40px;
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 10px;
        }

        .button-container {
            margin-top: 40px;
            opacity: 0;
        }

        .cta-button {
            background: #ff9800;
            color: white;
            font-size: 18px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cta-button:hover {
            background: #e68900;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Welcome to TravelMate</h1>

        <div class="grid">
            <div class="point">
                <div class="svg-number"><img src="number-one.png"> </div>
                <p>AI-powered customization for a personalized trip experience.</p>
            </div>

            <div class="point">
                <div class="svg-number"><img src="number-2.png"> </div>
                <p>Optimized travel routes for maximum efficiency and fun.</p>
            </div>

            <div class="point">
                <div class="svg-number"><img src="number-3.png"> </div>
                <p>Real-time adaptability to budget and preferences.</p>
            </div>
        </div>

        <div class="button-container">
            <button class="cta-button">Start Planning Now</button>
        </div>
    </div>

    <script>
        anime({
            targets: '.title',
            opacity: [0, 1],
            translateY: [-30, 0],
            duration: 800,
            easing: 'easeOutExpo'
        });

        anime({
            targets: '.description',
            opacity: [0, 1],
            delay: 500,
            duration: 800,
            easing: 'easeOutExpo'
        });

        anime({
            targets: '.grid',
            opacity: [0, 1],
            translateY: [-20, 0],
            delay: 800,
            duration: 800,
            easing: 'easeOutExpo'
        });

        anime({
            targets: '.point',
            opacity: [0, 1],
            translateY: [30, 0],
            delay: anime.stagger(300),
            duration: 800,
            easing: 'easeOutExpo'
        });

        anime({
            targets: '.button-container',
            opacity: [0, 1],
            translateY: [-20, 0],
            delay: 1200,
            duration: 800,
            easing: 'easeOutExpo'
        });
    </script>

</body>
</html>
