          <select id="wonderSelect" required>
            <option value="">Select a Wonder of the World</option>
            <option value="40.4319,116.5704">Great Wall of China</option>
            <option value="30.3285,35.4444">Petra, Jordan</option>
            <option value="-22.9519,-43.2105">Christ the Redeemer, Brazil</option>

  <script>
const primaryKey = "WJodrHtbnqwjOSOEp2uImvLKH0UFdz0t0gaGrrhDeNPPOudhcqdiJQQJ99CAACYeBjFLnVvHAAAgAZMP2lWJ"; // keep your real key

let map, datasource, hotelLayer;

window.onload = () => {
  initMap();
  document.getElementById("searchForm")
    .addEventListener("submit", handleSearch);
};

function initMap() {
  map = new atlas.Map("map", {
    center: [0, 0],
    zoom: 2,
    authOptions: {
      authType: "subscriptionKey",
      subscriptionKey: primaryKey
    }
  });

  map.events.add("ready", () => {
    datasource = new atlas.source.DataSource();
    map.sources.add(datasource);

    hotelLayer = new atlas.layer.SymbolLayer(datasource, null, {
      iconOptions: { image: "marker-red", anchor: "bottom" }
    });

    map.layers.add(hotelLayer);

    const popup = new atlas.Popup({ pixelOffset: [0, -30] });

    map.events.add("click", hotelLayer, e => {
      const props = e.shapes[0].getProperties();
      popup.setOptions({
        content: `
          <div style="padding:10px">
            <strong>${props.name}</strong><br>
            ${props.address || ""}
          </div>
        `,
        position: e.shapes[0].getCoordinates()
      });
      popup.open(map);
    });
  });
}

async function handleSearch(e) {
  e.preventDefault();

  const value = document.getElementById("wonderSelect").value;
  if (!value) return;

  const [lat, lon] = value.split(",").map(Number);

  const listContainer = document.getElementById("hotelsList");
  
  // 1. Clear previous results
  listContainer.innerHTML = "";
  datasource.clear();

  // Show loading (optional, but good UX)
  listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:white;">Loading hotels...</div>';

  const url = `https://atlas.microsoft.com/search/poi/json?api-version=1.0&subscription-key=${primaryKey}&query=hotel&lat=${lat}&lon=${lon}&radius=10000`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to fetch hotels`);

    const data = await res.json();

    // Clear loading text
    listContainer.innerHTML = "";

    if (data.results.length === 0) {
      listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:white;">No hotels found nearby.</div>';
      return;
    }

    // Center map on the wonder
    map.setCamera({ center: [lon, lat], zoom: 12 });

    data.results.forEach(hotel => {
      // --- PART 1: Add Pin to Map (You already had this) ---
      datasource.add(new atlas.data.Feature(
        new atlas.data.Point([hotel.position.lon, hotel.position.lat]),
        {
          name: hotel.poi.name,
          address: hotel.address.freeformAddress
        }
      ));

      // --- PART 2: Add Item to List (THIS WAS MISSING) ---
      const item = document.createElement("div");
      item.className = "hotel-item"; // Uses your existing CSS styling
      
      // Create HTML content for the list item
      item.innerHTML = `
        <div class="hotel-name">${hotel.poi.name}</div>
        <div class="hotel-address">${hotel.address.freeformAddress}</div>
        <div class="hotel-rating">★★★★☆</div>
      `;

      // Add functionality: Click list item to zoom map to that hotel
      item.onclick = () => {
        map.setCamera({ 
            center: [hotel.position.lon, hotel.position.lat], 
            zoom: 15,
            type: 'fly'
        });
      };

      // Append to the list container
      listContainer.appendChild(item);
    });

  } catch (error) {
    console.error(error);
    listContainer.innerHTML = '<div style="color:#ffb4b4; text-align:center;">Error fetching data.</div>';
  }
}
</script>
