<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top 10 Travel States in India</title>
  <style>
    *{
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ffcc85, #f3e981);
      padding: 20px;
    }
    
    h1 {
      text-align: center; 
      color: #ff8a00;
      margin-bottom: 40px;
      font-size: 2.5rem;
    }
    
    .state-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 0 20px;
    }
    
    .state-card {
      background: linear-gradient(135deg, #ff8a00,  #ff8a00);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px #e3ac6c;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .state-link {
      text-decoration: none;
      display: block;
      color: inherit;
      cursor: pointer;
    }
    
    .state-link:hover .state-card {
      transform: translateY(-10px);
      box-shadow: 0 12px 25px #ff8a00;
    }
    
    .state-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .state-card h3 {
      margin: 0;
      padding: 20px;
      background: #ff8a00;
      color: white;
      font-size: 1.3rem;
      text-align: center;
    }

    * {
  box-sizing: border-box;
}

/* ================= BODY ================= */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #071f18, #0b2e24);
  padding: 40px 20px;
  color: #cfeee4;
}

/* ================= HEADING ================= */
h1 {
  text-align: center;
  color: #a8e6cf;
  margin-bottom: 50px;
  font-size: 2.8rem;
  letter-spacing: 1px;
}

h1::after {
  content: "";
  display: block;
  width: 120px;
  height: 4px;
  background: #3db083;
  margin: 18px auto 0;
  border-radius: 4px;
}

/* ================= GRID ================= */
.state-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
  padding: 0 10px;
}

/* ================= CARD ================= */
.state-card {
  background: linear-gradient(145deg, #0b2e24, #114235);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

/* LINK */
.state-link {
  text-decoration: none;
  display: block;
  color: inherit;
}

/* HOVER EFFECT */
.state-link:hover .state-card {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
}

/* ================= IMAGE ================= */
.state-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
  filter: brightness(0.95) contrast(1.05);
  transition: transform 0.6s ease;
}

.state-link:hover img {
  transform: scale(1.08);
}

/* ================= TITLE ================= */
.state-card h3 {
  margin: 0;
  padding: 22px;
  background: linear-gradient(to right, #0d372c, #14503e);
  color: #d9f4eb;
  font-size: 1.4rem;
  text-align: center;
  letter-spacing: 0.5px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
  h1 {
    font-size: 2.2rem;
  }

  .state-card img {
    height: 190px;
  }
}

  </style>
</head>
<body>
 
  <h1>Top 12 States to Visit in India</h1>
  <div class="state-grid" id="stateGrid"></div>
  
  <script>
    const states = [
      { 
        name: "Rajasthan", 
        image: "prajasthan.jpg",
        page: "rajasthan.html"
      },
      { 
        name: "Kerala", 
        image: "pkerala.jpg",
        page: "kerala.html"
      },
      { 
        name: "Goa", 
        image: "pgoa.jpg",
        page: "goa.html"
      },
      { 
        name: "Himachal Pradesh", 
        image: "phimachalpradesh.jpg",
        page: "himachal-pradesh.html"
      },
      { 
        name: "Uttarakhand", 
        image: "puttarakhand.jpg",
        page: "uttarakhand.html"
      },
      { 
        name: "Tamil Nadu",   
        image: "ptamilnadu.jpg",
        page: "tamil-nadu.html"
      },
      { 
        name: "Maharashtra", 
        image: "pmaharashtra.jpg",
        page: "maharashtra.html"
      },
      { 
        name: "Karnataka", 
        image: "pkarnataka.jpg",
        page: "karnataka.html"
      },
      { 
        name: "Sikkim", 
        image: "psikkim.jpg",
        page: "sikkim.html"
      },
      { 
        name: "Assam", 
        image: "passam.jpg",
        page: "assam.html"
      },
      { 
        name: "Gujarat", 
        image: "pgujarat.jpg",
        page: "gujarat.html"
      },
      { 
        name: "Odisha", 
        image: "pOdisha.jpg",
        page: "odisha.html"
      }
    ];
    
    const grid = document.getElementById("stateGrid");
    
    states.forEach((state) => {
      // Create the anchor element
      const link = document.createElement("a");
      link.href = state.page; // Each state now has its own page
      link.className = "state-link";
      
      // Create the card div
      const card = document.createElement("div");
      card.className = "state-card";
      
      // Create and append the image
      const img = document.createElement("img");
      img.src = state.image;
      img.alt = state.name;
      card.appendChild(img);
      
      // Create and append the heading
      const heading = document.createElement("h3");
      heading.textContent = state.name;
      card.appendChild(heading);
      
      // Append card to link
      link.appendChild(card);
      
      // Append link to grid
      grid.appendChild(link);
    });
  </script>
</body>
</html>
